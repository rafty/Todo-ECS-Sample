# なぜ必要か: 単体テストでは外部PostgreSQLを使わず、H2で起動確認を完結させるため。
spring.datasource.url=jdbc:h2:mem:todoapp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# なぜ必要か: テストではFlywayのPostgreSQL専用DDLを実行せず、起動確認を最小に保つため。
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
