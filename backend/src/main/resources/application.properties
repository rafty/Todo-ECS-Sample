spring.application.name=backend

# なぜ必要か: ECSタスクから注入されるDB接続先をSpringが読み取り、環境ごとの接続差分を吸収するため。
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DBNAME:todoapp}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:todoapp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:todoapp}
spring.datasource.driver-class-name=org.postgresql.Driver

# なぜ必要か: ORMが暗黙DDLを実行せず、Flyway管理スキーマとの不整合を早期検知するため。
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tokyo

# なぜ必要か: マイグレーションを起動時に適用し、Aurora上のスキーマをコードで一元管理するため。
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# なぜ必要か: Cognitoのissuerを外部設定化し、環境ごとにJWT検証先を切り替え可能にするため。
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:https://cognito-idp.ap-northeast-1.amazonaws.com/dummy-user-pool-id}

# なぜ必要か: ALBヘルスチェック要件に合わせてヘルスエンドポイントをHTTP公開するため。
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
