spring.application.name=backend

# なぜ必要か: ECSタスクから注入されるDB接続先をSpringが読み取り、環境ごとの接続差分を吸収するため。
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DBNAME:todoapp}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:todoapp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:todoapp}
spring.datasource.driver-class-name=org.postgresql.Driver

# なぜ必要か: ORMが暗黙DDLを実行せず、Flyway管理スキーマとの不整合を早期検知するため。
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tokyo

# なぜ必要か: マイグレーションを起動時に適用し、Aurora上のスキーマをコードで一元管理するため。
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
